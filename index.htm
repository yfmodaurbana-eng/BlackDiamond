<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Black Diamond</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: white;

  /* 🌌 FONDO GLAMOUR */
  background: radial-gradient(circle at top, #1a1a1a, #000);
}

/* ✨ EFECTO BRILLO GENERAL */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://i.imgur.com/8QfQ7vF.png");
  opacity: 0.08;
  pointer-events: none;
}

/* 🔝 HEADER */
header {
  text-align: center;
  padding: 60px 20px;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3.8rem;
  margin: 0;

  /* 💎 TEXTO CON EFECTO DIAMANTE */
  background: linear-gradient(90deg, #ffffff, #d4af37, #ffffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  letter-spacing: 6px;
  text-transform: uppercase;
}

/* ✨ SUBTÍTULO */
header p {
  color: #aaa;
  margin-top: 10px;
  font-size: 0.9rem;
  letter-spacing: 2px;
}

/* 🛍️ SECCIÓN */
.productos {
  padding: 60px 20px;
}

/* 💎 TITULO CATALOGO */
.productos h2 {
  text-align: center;
  font-size: 2.2rem;

  background: linear-gradient(90deg, #d4af37, #fff, #d4af37);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  margin-bottom: 40px;
}

/* 🧱 GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
}

/* 🧊 TARJETA */
.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  backdrop-filter: blur(6px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 20px rgba(212,175,55,0.3);
}

/* 🖼️ IMG */
.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 10px;
}

/* 🏷️ TEXTO */
.card h3 {
  margin: 10px 0 5px;
}

.precio {
  color: #d4af37;
  font-size: 1.2rem;
}

/* 🔽 SELECTS */
select {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  background: black;
  color: white;
  border: 1px solid #333;
  border-radius: 6px;
}

/* 💳 BOTÓN */
.btn {
  width: 100%;
  margin-top: 12px;
  padding: 10px;

  background: linear-gradient(45deg, #d4af37, #f5d76e);
  border: none;
  color: black;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  opacity: 0.85;
}

/* 🔻 FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #777;
  font-size: 0.9rem;
}

</style>
</head>

<body>

<header>
  <h1>Black Diamond</h1>
  <p>Luxury Streetwear</p>
</header>

<section class="productos">
  <h2>Catálogo</h2>

  <div class="grid">

    <!-- PRODUCTO -->
    <div class="card">

      <img src="https://i.imgur.com/Kb6WlCs.jpeg">

      <h3>Camiseta Diamond</h3>
      <p class="precio">35€</p>

      <select>
        <option>Color</option>
        <option>Blanco</option>
        <option>Negro</option>
      </select>

      <select>
        <option>Talla</option>
        <option>S</option>
        <option>M</option>
        <option>L</option>
      </select>

      <button class="btn">Comprar</button>

    </div>

  </div>
</section>

<footer>
  © 2026 Black Diamond
</footer>

</body>
</html>
