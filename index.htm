<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* 💎 FONDO LUJO DIAMANTE */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;

  background:
    radial-gradient(circle at 20% 20%, #1a1a1a, transparent 40%),
    radial-gradient(circle at 80% 30%, #2a1f0a, transparent 45%),
    radial-gradient(circle at 50% 90%, #0d0d0d, #000);

  color: white;
  overflow-x: hidden;
}

/* partículas suaves lujo */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(212,175,55,0.06) 2px, transparent 3px);
  background-size: 90px 90px;
  animation: move 25s linear infinite;
  pointer-events: none;
}

@keyframes move {
  from { transform: translateY(0px); }
  to { transform: translateY(-200px); }
}

/* 💎 HEADER */
header {
  text-align: center;
  padding: 100px 20px 50px;
  position: relative;
}

/* glow fondo cabecera */
header::before {
  content: "";
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 500px;
  height: 180px;
  background: radial-gradient(circle, rgba(255,215,0,0.35), transparent 70%);
  filter: blur(40px);
  z-index: 0;
  animation: aura 6s ease-in-out infinite;
}

@keyframes aura {
  0% { opacity: 0.4; transform: translateX(-50%) scale(1); }
  50% { opacity: 0.8; transform: translateX(-50%) scale(1.1); }
  100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
}

/* 💎 TITULO PRINCIPAL */
.title-gold {
  position: relative;
  z-index: 1;

  font-size: 4.5rem;
  font-weight: 900;
  letter-spacing: 10px;
  font-family: 'Playfair Display', serif;

  background: linear-gradient(
    90deg,
    #6b4f0f,
    #ffd700,
    #fffbe6,
    #f5d76e,
    #d4af37,
    #7a5c12
  );

  background-size: 400% 400%;

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shine 4s ease-in-out infinite;

  text-shadow:
    0 0 10px rgba(255,215,0,0.35),
    0 0 25px rgba(255,215,0,0.25),
    0 0 55px rgba(212,175,55,0.18);

  filter: drop-shadow(0 0 18px rgba(255,215,0,0.25));
}

@keyframes shine {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 💎 CATÁLOGO */
.productos {
  padding: 80px 20px;
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(12px);

  border-top: 1px solid rgba(212,175,55,0.15);
  border-bottom: 1px solid rgba(212,175,55,0.15);
}

/* 💎 TITULO CATÁLOGO PREMIUM */
.productos h2 {
  text-align: center;
  margin-bottom: 50px;
  font-size: 2.7rem;
  font-family: 'Playfair Display', serif;
  letter-spacing: 6px;

  background: linear-gradient(
    90deg,
    #7a5c12,
    #ffd700,
    #fff8dc,
    #d4af37,
    #7a5c12
  );

  background-size: 300% 300%;

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shine 5s ease-in-out infinite;

  text-shadow:
    0 0 10px rgba(255,215,0,0.25),
    0 0 25px rgba(212,175,55,0.15);

  filter: drop-shadow(0 0 10px rgba(255,215,0,0.2));
}

/* GRID */
.grid {
  max-width: 1100px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 35px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  font-size: 0.8rem;
  color: #888;
  border-top: 1px solid rgba(212,175,55,0.2);
}

</style>
</head>
